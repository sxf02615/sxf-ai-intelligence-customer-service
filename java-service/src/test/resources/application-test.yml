# Test profile configuration for Smart Ticket Service
server:
  port: 8080

spring:
  application:
    name: smart-ticket-service-test
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

# Python Core Service Configuration (mocked in tests)
python-core:
  url: http://localhost:8000

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Authentication Configuration
auth:
  users:
    admin:
      username: admin
      password: admin123
      attributes: role:admin
    user:
      username: user
      password: user123
      attributes: role:user

# Logging Configuration
logging:
  level:
    com.smartticket: DEBUG
    org.springframework.web: INFO