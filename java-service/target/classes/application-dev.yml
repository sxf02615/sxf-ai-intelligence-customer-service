# Smart Ticket Service - Development Profile Configuration
# This file is used when running with --spring.profiles.active=dev

server:
  port: 8080

spring:
  application:
    name: smart-ticket-service-dev
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

# Python Core Service Configuration - Development
python-core:
  url: http://localhost:8000

# Actuator Configuration - Development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging Configuration - Development (more verbose)
logging:
  level:
    com.smartticket: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"